services:
  - type: web
    name: email-verifier-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python verify-app.py
    envVars:
      - key: ZEROBOUNCE_KEY
        sync: false
      - key: KICKBOX_KEY
        sync: false
      - key: NEVERBOUNCE_KEY
        sync: false
      - key: ABSTRACT_KEY
        sync: false
      - key: GOOGLE_SA_KEY
        sync: false
      - key: APP_PASSWORD
        sync: false
